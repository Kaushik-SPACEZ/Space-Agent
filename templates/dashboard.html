<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flood Query Dashboard</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        .header {
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            margin-bottom: 20px;
            text-align: center;
        }

        .header h1 {
            color: #667eea;
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        .header p {
            color: #666;
            font-size: 1.1em;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 20px;
        }

        .stat-card {
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            text-align: center;
        }

        .stat-card h3 {
            color: #667eea;
            font-size: 2em;
            margin-bottom: 5px;
        }

        .stat-card p {
            color: #666;
            font-size: 0.9em;
        }

        .main-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }

        @media (max-width: 968px) {
            .main-grid {
                grid-template-columns: 1fr;
            }
        }

        .card {
            background: white;
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        .card h2 {
            color: #667eea;
            margin-bottom: 20px;
            font-size: 1.5em;
        }

        .query-box {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .query-input {
            flex: 1;
            padding: 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 1em;
            transition: border-color 0.3s;
        }

        .query-input:focus {
            outline: none;
            border-color: #667eea;
        }

        .query-btn {
            padding: 15px 30px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1em;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .query-btn:hover {
            transform: translateY(-2px);
        }

        .query-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .example-queries {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 20px;
        }

        .example-btn {
            padding: 8px 15px;
            background: #f0f0f0;
            border: none;
            border-radius: 20px;
            font-size: 0.9em;
            cursor: pointer;
            transition: background 0.3s;
        }

        .example-btn:hover {
            background: #e0e0e0;
        }

        .sql-display {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-family: 'Courier New', monospace;
            font-size: 0.9em;
            color: #333;
            display: none;
        }

        .results-container {
            max-height: 500px;
            overflow-y: auto;
        }

        .result-item {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 10px;
            border-left: 4px solid #667eea;
        }

        .result-item h4 {
            color: #333;
            margin-bottom: 8px;
        }

        .result-item p {
            color: #666;
            font-size: 0.9em;
            margin: 3px 0;
        }

        .severity-low { border-left-color: #4caf50; }
        .severity-moderate { border-left-color: #ff9800; }
        .severity-high { border-left-color: #ff5722; }
        .severity-severe { border-left-color: #f44336; }
        .severity-catastrophic { border-left-color: #9c27b0; }

        #map {
            height: 500px;
            border-radius: 10px;
        }

        .loading {
            text-align: center;
            padding: 20px;
            color: #666;
        }

        .error {
            background: #ffebee;
            color: #c62828;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
        }

        .chart-container {
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🌊 Flood Query Dashboard</h1>
            <p>Natural Language Interface for Flood Data Analysis</p>
        </div>

        <div class="stats-grid" id="stats-grid">
            <div class="stat-card">
                <h3 id="total-events">-</h3>
                <p>Total Flood Events</p>
            </div>
            <div class="stat-card">
                <h3 id="recent-floods">-</h3>
                <p>Recent Floods (30 days)</p>
            </div>
            <div class="stat-card">
                <h3 id="total-area">-</h3>
                <p>Total Area Affected (sq km)</p>
            </div>
            <div class="stat-card">
                <h3 id="states-affected">-</h3>
                <p>States Affected</p>
            </div>
        </div>

        <div class="main-grid">
            <div class="card">
                <h2>🔍 Natural Language Query</h2>
                
                <div class="query-box">
                    <input 
                        type="text" 
                        id="query-input" 
                        class="query-input" 
                        placeholder="Ask a question... (e.g., Show me floods in Tamil Nadu)"
                    />
                    <button id="query-btn" class="query-btn">Search</button>
                </div>

                <div class="example-queries">
                    <button class="example-btn" data-query="Show me all floods in Tamil Nadu">Tamil Nadu floods</button>
                    <button class="example-btn" data-query="Show me severe floods in 2024">Severe floods 2024</button>
                    <button class="example-btn" data-query="What are the recent floods in Kerala?">Recent Kerala floods</button>
                    <button class="example-btn" data-query="Show me floods affecting more than 500 sq km">Large floods (>500 sq km)</button>
                    <button class="example-btn" data-query="List floods in West Bengal in 2023">West Bengal 2023</button>
                </div>

                <div id="sql-display" class="sql-display"></div>
                <div id="error-display" class="error" style="display: none;"></div>

                <div id="results-container" class="results-container"></div>
            </div>

            <div class="card">
                <h2>🗺️ Flood Locations Map</h2>
                <div id="map"></div>
            </div>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        // Initialize map
        const map = L.map('map').setView([20.5937, 78.9629], 5); // Center on India
        
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '© OpenStreetMap contributors'
        }).addTo(map);

        let markers = [];

        // Load statistics
        async function loadStats() {
            try {
                const response = await fetch('/api/stats');
                const data = await response.json();
                
                document.getElementById('total-events').textContent = data.total_events;
                document.getElementById('recent-floods').textContent = data.recent_floods;
                document.getElementById('total-area').textContent = data.total_area_affected.toLocaleString();
                document.getElementById('states-affected').textContent = Object.keys(data.state_counts).length;
            } catch (error) {
                console.error('Error loading stats:', error);
            }
        }

        // Load map data
        async function loadMapData() {
            try {
                const response = await fetch('/api/map-data?limit=100');
                const data = await response.json();
                
                // Clear existing markers
                markers.forEach(marker => map.removeLayer(marker));
                markers = [];
                
                // Add markers
                data.features.forEach(flood => {
                    const marker = L.circleMarker([flood.latitude, flood.longitude], {
                        radius: getSeverityRadius(flood.severity),
                        fillColor: getSeverityColor(flood.severity),
                        color: '#fff',
                        weight: 1,
                        opacity: 1,
                        fillOpacity: 0.7
                    }).addTo(map);
                    
                    marker.bindPopup(`
                        <strong>${flood.uei}</strong><br>
                        State: ${flood.state}<br>
                        Date: ${flood.start_date}<br>
                        Severity: ${flood.severity}<br>
                        Area: ${flood.area_affected_sqkm} sq km<br>
                        Cause: ${flood.main_cause}
                    `);
                    
                    markers.push(marker);
                });
            } catch (error) {
                console.error('Error loading map data:', error);
            }
        }

        function getSeverityColor(severity) {
            const colors = {
                'Low': '#4caf50',
                'Moderate': '#ff9800',
                'High': '#ff5722',
                'Severe': '#f44336',
                'Catastrophic': '#9c27b0'
            };
            return colors[severity] || '#666';
        }

        function getSeverityRadius(severity) {
            const sizes = {
                'Low': 5,
                'Moderate': 7,
                'High': 9,
                'Severe': 11,
                'Catastrophic': 13
            };
            return sizes[severity] || 6;
        }

        // Handle query
        async function executeQuery(query) {
            const queryBtn = document.getElementById('query-btn');
            const resultsContainer = document.getElementById('results-container');
            const sqlDisplay = document.getElementById('sql-display');
            const errorDisplay = document.getElementById('error-display');
            
            queryBtn.disabled = true;
            queryBtn.textContent = 'Searching...';
            resultsContainer.innerHTML = '<div class="loading">Processing query...</div>';
            sqlDisplay.style.display = 'none';
            errorDisplay.style.display = 'none';
            
            try {
                const response = await fetch('/api/query', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ query })
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    // Show SQL
                    sqlDisplay.textContent = `SQL: ${data.sql_query}`;
                    sqlDisplay.style.display = 'block';
                    
                    // Show results
                    if (data.results.length === 0) {
                        resultsContainer.innerHTML = '<div class="loading">No results found</div>';
                    } else {
                        resultsContainer.innerHTML = data.results.map(result => `
                            <div class="result-item severity-${result.severity.toLowerCase()}">
                                <h4>${result.uei} - ${result.state}</h4>
                                <p><strong>Date:</strong> ${result.start_date}</p>
                                <p><strong>Severity:</strong> ${result.severity}</p>
                                <p><strong>Area:</strong> ${result.area_affected_sqkm} sq km</p>
                                <p><strong>Cause:</strong> ${result.main_cause}</p>
                                ${result.district ? `<p><strong>District:</strong> ${result.district}</p>` : ''}
                            </div>
                        `).join('');
                    }
                } else {
                    errorDisplay.textContent = `Error: ${data.error}`;
                    errorDisplay.style.display = 'block';
                    resultsContainer.innerHTML = '';
                }
            } catch (error) {
                errorDisplay.textContent = `Error: ${error.message}`;
                errorDisplay.style.display = 'block';
                resultsContainer.innerHTML = '';
            } finally {
                queryBtn.disabled = false;
                queryBtn.textContent = 'Search';
            }
        }

        // Event listeners
        document.getElementById('query-btn').addEventListener('click', () => {
            const query = document.getElementById('query-input').value;
            if (query.trim()) {
                executeQuery(query);
            }
        });

        document.getElementById('query-input').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                const query = e.target.value;
                if (query.trim()) {
                    executeQuery(query);
                }
            }
        });

        document.querySelectorAll('.example-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                const query = btn.getAttribute('data-query');
                document.getElementById('query-input').value = query;
                executeQuery(query);
            });
        });

        // Load initial data
        loadStats();
        loadMapData();
    </script>
</body>
</html>
